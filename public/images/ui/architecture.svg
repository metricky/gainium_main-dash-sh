<svg viewBox="0 0 400 225" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 8px var(--accent-color-alpha, rgba(249, 115, 22, 0.27))); } 50% { filter: drop-shadow(0 0 16px var(--accent-color-alpha2, rgba(249, 115, 22, 0.53))); } }
    @keyframes bolt { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.15); } }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .glow { animation: glow 2s ease-in-out infinite; }
    .bolt { animation: bolt 1.5s ease-in-out infinite; transform-origin: center; }
    :root {
      --accent-color: var(--color-primary, #f97316);
      --bg-color: var(--color-background, #0f0f0f);
      --card-color: var(--color-card, #1a1a1a);
      --muted-color: var(--color-muted, #2a2a2a);
    }
  </style>
  <rect width="400" height="225" fill="var(--bg-color, #0f0f0f)"/>

  <!-- Device frame (larger, centered) -->
  <rect x="40" y="20" width="320" height="185" rx="10" fill="var(--card-color, #1a1a1a)" stroke="var(--accent-color, #f97316)" stroke-width="2" class="glow"/>
  <rect x="180" y="207" width="40" height="4" rx="2" fill="var(--muted-color, #2a2a2a)"/>
  <rect x="155" y="211" width="90" height="8" rx="3" fill="var(--muted-color, #2a2a2a)"/>

  <!-- Database icon (centered and larger) -->
  <ellipse cx="200" cy="75" rx="50" ry="25" fill="var(--accent-color, #f97316)" opacity="0.2"/>
  <ellipse cx="200" cy="75" rx="50" ry="25" stroke="var(--accent-color, #f97316)" stroke-width="2" fill="none"/>
  <path d="M150 75 L150 120 Q150 145 200 145 Q250 145 250 120 L250 75" stroke="var(--accent-color, #f97316)" stroke-width="2" fill="none"/>
  <ellipse cx="200" cy="120" rx="50" ry="25" stroke="var(--accent-color, #f97316)" stroke-width="2" fill="none" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- Data bars (wider) -->
  <rect x="70" y="160" width="80" height="8" rx="4" fill="var(--accent-color, #f97316)" opacity="0.4" class="pulse"/>
  <rect x="160" y="160" width="60" height="8" rx="4" fill="var(--accent-color, #f97316)" opacity="0.3" class="pulse" style="animation-delay: 0.3s"/>
  <rect x="230" y="160" width="50" height="8" rx="4" fill="var(--accent-color, #f97316)" opacity="0.4" class="pulse" style="animation-delay: 0.6s"/>
  <rect x="290" y="160" width="50" height="8" rx="4" fill="var(--accent-color, #f97316)" opacity="0.3" class="pulse" style="animation-delay: 0.9s"/>

  <rect x="70" y="178" width="55" height="8" rx="4" fill="var(--accent-color, #f97316)" opacity="0.3"/>
  <rect x="135" y="178" width="75" height="8" rx="4" fill="var(--accent-color, #f97316)" opacity="0.4"/>
  <rect x="220" y="178" width="60" height="8" rx="4" fill="var(--accent-color, #f97316)" opacity="0.3"/>
  <rect x="290" y="178" width="50" height="8" rx="4" fill="var(--accent-color, #f97316)" opacity="0.4"/>

  <!-- Lightning bolt badge (top right) -->
  <g class="bolt">
    <circle cx="330" cy="50" r="28" fill="var(--accent-color, #f97316)" opacity="0.2"/>
    <circle cx="330" cy="50" r="22" fill="var(--bg-color, #0f0f0f)"/>
    <path d="M324 38 L336 38 L330 50 L340 50 L320 68 L328 54 L318 54 Z" fill="var(--accent-color, #f97316)" stroke="var(--accent-color, #f97316)" stroke-width="1" stroke-linejoin="round"/>
  </g>
</svg>
