<svg viewBox="0 0 400 225" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --accent-color: var(--color-primary, #f97316);
      --bg-color: var(--color-background, #0f0f0f);
      --card-color: var(--color-card, #1a1a1a);
      --muted-color: var(--color-muted, #2a2a2a);
      --muted-fg: var(--color-muted-foreground, #64748b);
      --text-color: var(--color-foreground, #e0e0e0);
      --input-bg: var(--color-input, #0a0a0a);
    }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .panel { animation: scaleIn 0.3s ease-out both; transform-origin: center; }
    .cursor { animation: blink 1s ease-in-out infinite; }
    .result1 { animation: slideUp 0.3s ease-out 0.1s both; }
    .result2 { animation: slideUp 0.3s ease-out 0.2s both; }
    .result3 { animation: slideUp 0.3s ease-out 0.3s both; }
  </style>
  <rect width="400" height="225" fill="var(--bg-color, #0f0f0f)"/>

  <!-- Panel -->
  <rect class="panel" x="10" y="10" width="380" height="205" rx="10" fill="var(--card-color, #1a1a1a)" stroke="var(--accent-color, #f97316)" stroke-width="2"/>

  <!-- Search input -->
  <rect x="20" y="20" width="360" height="38" rx="6" fill="var(--input-bg, #0a0a0a)" stroke="var(--muted-color, #3a3a3a)" stroke-width="1"/>
  <text x="35" y="45" font-family="system-ui, sans-serif" font-size="14" fill="#fff">trading bot</text>
  <text class="cursor" x="115" y="45" font-family="system-ui, sans-serif" font-size="14" fill="var(--accent-color, #f97316)">|</text>

  <!-- Search icon -->
  <circle cx="355" cy="39" r="10" stroke="var(--accent-color, #f97316)" stroke-width="2" fill="none"/>
  <line x1="362" y1="46" x2="368" y2="52" stroke="var(--accent-color, #f97316)" stroke-width="2" stroke-linecap="round"/>

  <!-- Results label -->
  <text x="20" y="78" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="var(--muted-fg, #64748b)" letter-spacing="0.5">BOTS</text>

  <!-- Result 1 -->
  <g class="result1">
    <rect x="20" y="85" width="360" height="38" rx="6" fill="var(--accent-color, #f97316)" opacity="0.15" stroke="var(--accent-color, #f97316)" stroke-width="1"/>
    <circle cx="35" cy="104" r="5" fill="var(--accent-color, #f97316)"/>
    <text x="52" y="100" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fff">ETH Trading Bot</text>
    <text x="52" y="114" font-family="system-ui, sans-serif" font-size="10" fill="var(--muted-fg, #a0a0a0)">Active DCA Bot • 15% profit</text>
  </g>

  <!-- Result 2 -->
  <g class="result2">
    <rect x="20" y="130" width="360" height="38" rx="6" fill="var(--muted-color, #2a2a2a)"/>
    <circle cx="35" cy="149" r="5" fill="var(--muted-fg, #64748b)"/>
    <text x="52" y="145" font-family="system-ui, sans-serif" font-size="12" fill="var(--text-color, #e0e0e0)">BTC Grid Bot</text>
    <text x="52" y="159" font-family="system-ui, sans-serif" font-size="10" fill="var(--muted-fg, #64748b)">Grid Bot • 8% profit</text>
  </g>

  <!-- Pages label -->
  <text x="20" y="180" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="var(--muted-fg, #64748b)" letter-spacing="0.5">PAGES</text>

  <!-- Result 3 -->
  <g class="result3">
    <rect x="20" y="186" width="360" height="26" rx="6" fill="var(--muted-color, #2a2a2a)"/>
    <!-- Chart bar icon -->
    <rect x="35" y="194" width="4" height="10" rx="1" fill="#10b981"/>
    <rect x="41" y="191" width="4" height="13" rx="1" fill="#ef4444"/>
    <rect x="47" y="196" width="4" height="8" rx="1" fill="#3b82f6"/>
    <text x="58" y="203" font-family="system-ui, sans-serif" font-size="11" fill="var(--text-color, #e0e0e0)">Trading Dashboard</text>
  </g>
</svg>
