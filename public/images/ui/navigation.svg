<svg viewBox="0 0 400 225" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --accent-color: var(--color-primary, #f97316);
      --bg-color: var(--color-background, #0f0f0f);
      --card-color: var(--color-card, #1a1a1a);
      --muted-color: var(--color-muted, #2a2a2a);
      --muted-fg: var(--color-muted-foreground, #64748b);
      --sidebar-bg: var(--color-sidebar, #1a0f2e);
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toggleOn {
      0%, 40% { transform: translateX(0); }
      60%, 100% { transform: translateX(14px); }
    }
    @keyframes toggleColor {
      0%, 40% { fill: var(--muted-fg, #64748b); }
      60%, 100% { fill: #fff; }
    }
    @keyframes toggleBg {
      0%, 40% { fill: var(--muted-color, #3a3a3a); }
      60%, 100% { fill: var(--accent-color, #f97316); }
    }
    @keyframes itemGlow {
      0%, 40% { fill: var(--muted-color, #2a2a2a); stroke: transparent; }
      60%, 100% { fill: color-mix(in srgb, var(--accent-color, #f97316) 15%, transparent); stroke: var(--accent-color, #f97316); }
    }
    @keyframes iconAppear {
      0%, 50% { opacity: 0; transform: scale(0.5); }
      70%, 100% { opacity: 1; transform: scale(1); }
    }
    .nav1 { animation: slideIn 0.3s ease-out 0.1s both; }
    .nav2 { animation: slideIn 0.3s ease-out 0.15s both; }
    .nav3 { animation: slideIn 0.3s ease-out 0.2s both; }
    .nav4 { animation: slideIn 0.3s ease-out 0.25s both; }
    .nav5 { animation: slideIn 0.3s ease-out 0.3s both; }
    .toggleAnim { animation: toggleOn 3s ease-in-out infinite, toggleColor 3s ease-in-out infinite; }
    .toggleBgAnim { animation: toggleBg 3s ease-in-out infinite; }
    .itemGlow { animation: itemGlow 3s ease-in-out infinite; }
    .iconAppear { animation: iconAppear 3s ease-in-out infinite; transform-origin: center; }
  </style>
  <rect width="400" height="225" fill="var(--bg-color, #0f0f0f)"/>

  <!-- Floating Sidebar with rounded corners -->
  <rect x="10" y="10" width="55" height="205" rx="12" fill="var(--sidebar-bg, #1a0f2e)"/>

  <!-- Pinned nav icons (in sidebar) - generic icons -->
  <g class="nav1">
    <rect x="18" y="20" width="38" height="38" rx="8" fill="var(--accent-color, #f97316)" opacity="0.2"/>
    <rect x="28" y="32" width="18" height="14" rx="3" stroke="var(--accent-color, #f97316)" stroke-width="2" fill="none"/>
    <path d="M32 32 L37 27 L42 32" stroke="var(--accent-color, #f97316)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="nav2">
    <rect x="18" y="68" width="38" height="38" rx="8" fill="transparent"/>
    <circle cx="37" cy="82" r="8" stroke="var(--muted-fg, #64748b)" stroke-width="2" fill="none"/>
    <circle cx="37" cy="82" r="3" fill="var(--muted-fg, #64748b)"/>
  </g>

  <g class="nav3">
    <rect x="18" y="116" width="38" height="38" rx="8" fill="transparent"/>
    <rect x="28" y="126" width="18" height="18" rx="2" stroke="var(--muted-fg, #64748b)" stroke-width="2" fill="none"/>
    <path d="M28 132 L46 132" stroke="var(--muted-fg, #64748b)" stroke-width="2"/>
  </g>

  <!-- New item appearing (animated) -->
  <g class="iconAppear">
    <rect x="18" y="164" width="38" height="38" rx="8" fill="var(--accent-color, #f97316)" opacity="0.15"/>
    <path d="M30 178 L30 188 M37 175 L37 188 M44 181 L44 188" stroke="var(--accent-color, #f97316)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Customization panel -->
  <rect x="80" y="10" width="310" height="205" rx="10" fill="var(--card-color, #1a1a1a)" stroke="var(--muted-color, #2a2a2a)" stroke-width="1"/>

  <!-- Navigation items list - generic placeholders -->
  <g class="nav4">
    <rect x="90" y="65" width="290" height="36" rx="6" fill="var(--muted-color, #2a2a2a)"/>
    <circle cx="110" cy="83" r="3" fill="var(--muted-fg, #64748b)"/>
    <circle cx="118" cy="83" r="3" fill="var(--muted-fg, #64748b)"/>
    <rect x="135" y="75" width="16" height="16" rx="3" stroke="#fff" stroke-width="1.5" fill="none"/>
    <rect x="160" y="78" width="70" height="10" rx="3" fill="var(--muted-color, #3a3a3a)"/>
    <rect x="338" y="72" width="32" height="22" rx="11" fill="var(--accent-color, #f97316)"/>
    <circle cx="359" cy="83" r="7" fill="#fff"/>
  </g>

  <g class="nav5">
    <rect x="90" y="108" width="290" height="36" rx="6" fill="var(--muted-color, #2a2a2a)"/>
    <circle cx="110" cy="126" r="3" fill="var(--muted-fg, #64748b)"/>
    <circle cx="118" cy="126" r="3" fill="var(--muted-fg, #64748b)"/>
    <circle cx="143" cy="126" r="8" stroke="#fff" stroke-width="1.5" fill="none"/>
    <rect x="160" y="121" width="55" height="10" rx="3" fill="var(--muted-color, #3a3a3a)"/>
    <rect x="338" y="115" width="32" height="22" rx="11" fill="var(--accent-color, #f97316)"/>
    <circle cx="359" cy="126" r="7" fill="#fff"/>
  </g>

  <!-- Item being toggled on (animated) -->
  <g>
    <rect class="itemGlow" x="90" y="151" width="290" height="36" rx="6" stroke-width="1"/>
    <circle cx="110" cy="169" r="3" fill="var(--muted-fg, #64748b)"/>
    <circle cx="118" cy="169" r="3" fill="var(--muted-fg, #64748b)"/>
    <path d="M135 163 L135 175 M141 160 L141 175 M147 166 L147 175" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="160" y="164" width="60" height="10" rx="3" fill="var(--muted-color, #3a3a3a)"/>
    <rect class="toggleBgAnim" x="338" y="158" width="32" height="22" rx="11"/>
    <circle class="toggleAnim" cx="345" cy="169" r="7"/>
  </g>

  <!-- More items placeholder -->
  <rect x="90" y="194" width="290" height="14" rx="4" fill="var(--muted-color, #2a2a2a)" opacity="0.5"/>
</svg>
