<svg viewBox="0 0 400 225" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --accent-color: var(--color-primary, #f97316);
      --bg-color: var(--color-background, #0f0f0f);
      --card-color: var(--color-card, #1a1a1a);
      --muted-color: var(--color-muted, #2a2a2a);
      --muted-fg: var(--color-muted-foreground, #64748b);
      --text-color: var(--color-foreground, #e0e0e0);
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes drawChart { from { stroke-dashoffset: 300; } to { stroke-dashoffset: 0; } }
    .w1 { animation: fadeIn 0.3s ease-out 0.1s both; }
    .w2 { animation: fadeIn 0.3s ease-out 0.15s both; }
    .w3 { animation: fadeIn 0.3s ease-out 0.2s both; }
    .w4 { animation: fadeIn 0.3s ease-out 0.25s both; }
    .w5 { animation: fadeIn 0.3s ease-out 0.3s both; }
    .w6 { animation: fadeIn 0.3s ease-out 0.35s both; }
    .chart { stroke-dasharray: 300; animation: drawChart 1.5s ease-out 0.5s both; }
  </style>
  <rect width="400" height="225" fill="var(--bg-color, #0f0f0f)"/>

  <!-- Widget 1: Portfolio -->
  <g class="w1">
    <rect x="5" y="5" width="195" height="85" rx="6" fill="var(--card-color, #1a1a1a)" stroke="var(--muted-color, #2a2a2a)" stroke-width="1"/>
    <text x="15" y="22" font-family="system-ui, sans-serif" font-size="9" fill="var(--muted-fg, #64748b)">Portfolio Value</text>
    <text x="15" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#10b981">$45,892</text>
    <text x="15" y="56" font-family="system-ui, sans-serif" font-size="9" fill="#10b981">+12.5% ↑</text>
    <polyline class="chart" points="15,78 45,70 75,74 105,62 135,68 165,58 185,55" stroke="#10b981" stroke-width="2" fill="none"/>
    <path d="M15,85 L15,78 L45,70 L75,74 L105,62 L135,68 L165,58 L185,55 L185,85 Z" fill="#10b981" opacity="0.1"/>
  </g>

  <!-- Widget 2: Active Bots -->
  <g class="w2">
    <rect x="205" y="5" width="95" height="85" rx="6" fill="var(--card-color, #1a1a1a)" stroke="var(--muted-color, #2a2a2a)" stroke-width="1"/>
    <text x="215" y="22" font-family="system-ui, sans-serif" font-size="9" fill="var(--muted-fg, #64748b)">Active Bots</text>
    <text x="252" y="52" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">12</text>
    <rect x="220" y="65" width="65" height="16" rx="4" fill="var(--accent-color, #f97316)" opacity="0.15"/>
    <text x="252" y="77" font-family="system-ui, sans-serif" font-size="9" fill="var(--accent-color, #f97316)" text-anchor="middle">8 profitable</text>
  </g>

  <!-- Widget 3: News -->
  <g class="w3">
    <rect x="305" y="5" width="90" height="85" rx="6" fill="var(--card-color, #1a1a1a)" stroke="var(--muted-color, #2a2a2a)" stroke-width="1"/>
    <text x="315" y="22" font-family="system-ui, sans-serif" font-size="9" fill="var(--muted-fg, #64748b)">📰 News</text>
    <rect x="315" y="30" width="70" height="10" rx="2" fill="var(--muted-color, #2a2a2a)"/>
    <rect x="315" y="44" width="55" height="10" rx="2" fill="var(--muted-color, #2a2a2a)"/>
    <rect x="315" y="58" width="65" height="10" rx="2" fill="var(--muted-color, #2a2a2a)"/>
    <rect x="315" y="72" width="50" height="10" rx="2" fill="var(--muted-color, #2a2a2a)"/>
  </g>

  <!-- Widget 4: Trades -->
  <g class="w4">
    <rect x="5" y="95" width="130" height="125" rx="6" fill="var(--card-color, #1a1a1a)" stroke="var(--muted-color, #2a2a2a)" stroke-width="1"/>
    <text x="15" y="112" font-family="system-ui, sans-serif" font-size="9" fill="var(--muted-fg, #64748b)">Recent Trades</text>
    <rect x="15" y="120" width="110" height="22" rx="4" fill="#10b981" opacity="0.15"/>
    <text x="25" y="135" font-family="system-ui, sans-serif" font-size="9" fill="#10b981">BUY ETH +2.3%</text>
    <rect x="15" y="148" width="110" height="22" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="25" y="163" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444">SELL BTC -0.8%</text>
    <rect x="15" y="176" width="110" height="22" rx="4" fill="#10b981" opacity="0.15"/>
    <text x="25" y="191" font-family="system-ui, sans-serif" font-size="9" fill="#10b981">BUY SOL +5.1%</text>
  </g>

  <!-- Widget 5: Prices -->
  <g class="w5">
    <rect x="140" y="95" width="165" height="125" rx="6" fill="var(--card-color, #1a1a1a)" stroke="var(--muted-color, #2a2a2a)" stroke-width="1"/>
    <text x="150" y="112" font-family="system-ui, sans-serif" font-size="9" fill="var(--muted-fg, #64748b)">📊 Market Prices</text>
    <text x="150" y="135" font-family="system-ui, sans-serif" font-size="10" fill="var(--text-color, #e0e0e0)">BTC</text>
    <text x="290" y="135" font-family="system-ui, sans-serif" font-size="10" fill="#10b981" text-anchor="end">$58,245 +2.1%</text>
    <text x="150" y="160" font-family="system-ui, sans-serif" font-size="10" fill="var(--text-color, #e0e0e0)">ETH</text>
    <text x="290" y="160" font-family="system-ui, sans-serif" font-size="10" fill="#10b981" text-anchor="end">$3,124 +3.8%</text>
    <text x="150" y="185" font-family="system-ui, sans-serif" font-size="10" fill="var(--text-color, #e0e0e0)">SOL</text>
    <text x="290" y="185" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444" text-anchor="end">$142 -1.2%</text>
    <text x="150" y="210" font-family="system-ui, sans-serif" font-size="10" fill="var(--text-color, #e0e0e0)">BNB</text>
    <text x="290" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#10b981" text-anchor="end">$612 +0.9%</text>
  </g>

  <!-- Widget 6: Actions -->
  <g class="w6">
    <rect x="310" y="95" width="85" height="125" rx="6" fill="var(--card-color, #1a1a1a)" stroke="var(--muted-color, #2a2a2a)" stroke-width="1"/>
    <text x="320" y="112" font-family="system-ui, sans-serif" font-size="9" fill="var(--muted-fg, #64748b)">Actions</text>
    <rect x="320" y="122" width="65" height="26" rx="5" fill="var(--accent-color, #f97316)" opacity="0.2"/>
    <text x="352" y="140" font-family="system-ui, sans-serif" font-size="10" fill="var(--accent-color, #f97316)" text-anchor="middle">+ Bot</text>
    <rect x="320" y="155" width="65" height="26" rx="5" fill="var(--muted-color, #2a2a2a)"/>
    <text x="352" y="173" font-family="system-ui, sans-serif" font-size="10" fill="var(--muted-fg, #a0a0a0)" text-anchor="middle">⚙️ Settings</text>
    <rect x="320" y="188" width="65" height="26" rx="5" fill="var(--muted-color, #2a2a2a)"/>
    <text x="352" y="206" font-family="system-ui, sans-serif" font-size="10" fill="var(--muted-fg, #a0a0a0)" text-anchor="middle">📈 Reports</text>
  </g>
</svg>
