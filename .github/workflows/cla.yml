name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write          # allow the action to update the signatures file
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN only needed if storing signatures in a SEPARATE repo.
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # Where the list of signatures is stored (created automatically on first sign).
          path-to-signatures: 'signatures/version1/cla.json'

          # The CLA document contributors are agreeing to.
          path-to-document: 'https://github.com/Gainium/main-dash-sh/blob/main/CLA.md'

          # Branch where the signatures file lives. Keep it on the default branch.
          branch: 'main'

          # Bot wording shown on the PR.
          custom-notsigned-prcomment: 'Thank you for your contribution. Before we can merge it, please read our [Contributor License Agreement](https://github.com/Gainium/main-dash-sh/blob/main/CLA.md). If you agree, comment below with the exact sentence:'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'

          # Accounts that never need to sign (you, AI assistants emitting
          # Co-Authored-By:, and bots). The action matches each commit's
          # GitHub login OR email — emails are needed because
          # Co-Authored-By: Claude <noreply@anthropic.com> doesn't reverse-
          # lookup to a GitHub user and would otherwise block the PR.
          allowlist: 'maksymshamko,aressanch,claude,noreply@anthropic.com,*@anthropic.com,dependabot[bot],bot*,*[bot]'

          # Re-trigger signing when the CLA text itself changes.
          # remote-organization-name:   # set only if signatures live in another org
          # remote-repository-name:     # set only if signatures live in another repo
