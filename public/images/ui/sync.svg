<svg viewBox="0 0 400 225" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --accent-color: var(--color-primary, #f97316);
      --bg-color: var(--color-background, #0f0f0f);
      --card-color: var(--color-card, #1a1a1a);
      --muted-color: var(--color-muted, #2a2a2a);
      --border-color: var(--color-border, #3a3a3a);
    }
    @keyframes dash { to { stroke-dashoffset: -16; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .sync { stroke-dasharray: 8 8; animation: dash 1s linear infinite; }
    .device { animation: pulse 2s ease-in-out infinite; }
    .cloud { animation: float 3s ease-in-out infinite; }
  </style>
  <rect width="400" height="225" fill="var(--bg-color, #0f0f0f)"/>

  <!-- Cloud (top left corner) -->
  <g class="cloud">
    <ellipse cx="75" cy="55" rx="50" ry="32" fill="var(--accent-color, #f97316)" opacity="0.1"/>
    <ellipse cx="55" cy="55" rx="35" ry="22" fill="var(--accent-color, #f97316)" opacity="0.1"/>
    <ellipse cx="95" cy="55" rx="35" ry="22" fill="var(--accent-color, #f97316)" opacity="0.1"/>
    <path d="M40 55 Q40 38 58 38 Q58 27 75 27 Q92 27 92 38 Q110 38 110 55 Q110 70 92 70 L58 70 Q40 70 40 55" stroke="var(--accent-color, #f97316)" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Mobile (bottom left) -->
  <g class="device" style="animation-delay: 0.5s;">
    <rect x="30" y="100" width="90" height="115" rx="10" fill="var(--card-color, #1a1a1a)" stroke="var(--border-color, #3a3a3a)" stroke-width="2"/>
    <rect x="60" y="198" width="30" height="5" rx="2" fill="var(--muted-color, #2a2a2a)"/>
    <circle cx="75" cy="150" r="22" fill="var(--accent-color, #f97316)" opacity="0.2"/>
    <path d="M65 150 L72 157 L87 142" stroke="var(--accent-color, #f97316)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Desktop (right side - taller) -->
  <g class="device">
    <rect x="180" y="30" width="200" height="140" rx="6" fill="var(--card-color, #1a1a1a)" stroke="var(--border-color, #3a3a3a)" stroke-width="2"/>
    <rect x="260" y="172" width="40" height="4" rx="2" fill="var(--muted-color, #2a2a2a)"/>
    <rect x="230" y="176" width="100" height="10" rx="3" fill="var(--muted-color, #2a2a2a)"/>
    <circle cx="280" cy="90" r="28" fill="var(--accent-color, #f97316)" opacity="0.2"/>
    <path d="M266 90 L276 100 L296 80" stroke="var(--accent-color, #f97316)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Sync lines from cloud to devices only -->
  <!-- Cloud to Desktop -->
  <path class="sync" d="M125 55 L175 55" stroke="var(--accent-color, #f97316)" stroke-width="2"/>
  <polygon points="170,51 180,55 170,59" fill="var(--accent-color, #f97316)"/>

  <!-- Cloud to Mobile -->
  <path class="sync" d="M75 85 L75 95" stroke="var(--accent-color, #f97316)" stroke-width="2"/>
  <polygon points="71,90 75,100 79,90" fill="var(--accent-color, #f97316)"/>
</svg>
